<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Medicine</title>
    <style>
.header {
    position: absolute;
    top: 20px;
    right: 30px;
}
a {
    color: #8f36fb;
    text-decoration: none;
    font-weight: bold;
    margin-right: 20px;
    padding: 10px;
    border: 2px solid #8f36fb;
    border-radius: 5px;
    transition: background-color 0.3s;
}

a:hover {
    background-color: #5400bb;
    color: white;
}
.container {
    display: flex;
    justify-content: space-around; 
    gap: 20px;
    padding: 40px;
}
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #c99eff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 20px;
        }
        form {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px #000000;
        }
        h1 {
            color: #8f36fb;
            text-align: center;
        }
        label, input {
            display: block;
            width: 100%;
            margin-top: 10px;
        }
        input {
            padding: 10px;
            border: 1px solid #d2b5f5;
            border-radius: 5px;
        }
        button {
            background-color: #8f36fb;
            color: white;
            border: none;
            padding: 10px 20px;
            margin-top: 15px;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background-color: #5400bb;
        }
     .container {
     display: flex;
     justify-content: left;
     gap: 40px;
     padding: 30px;
}
    </style>
</head>
<div class="header">
    <a href="/logout" style="float: right; margin-right: 10px; font-weight: bold;">Logout</a>
</div>
<body>
 <div class="container">
    <form method="post">
        <h1>Add a New Medicine</h1>
        <label for="formula">Medicine Formula:</label>
        <input type="text" id="formula" name="formula" required>
        <label for="name">Medicine Name:</label>
        <input type="text" id="name" name="name" required>
        <label for="price">Price (INR):</label>
        <input type="number" id="price" name="price" required>
        <button type="submit">Add Medicine</button>
    </form>

    <form method="post" action="/update_price">
        <h1>Update Price</h1>
        <label for="name">Medicine Name:</label>
        <input type="text" id="name" name="name" required>
        <label for="price">New Price:</label>
        <input type="number" id="price" name="price" required>
        <button type="submit">Update Price</button>
    </form>

    <form method="post" action="/delete_dawa">
        <h1>Delete Medicines</h1>
        <label for="name">Medicine Name:</label>
        <input type="text" id="name" name="name" required>
        <button type="submit">Delete</button>
    </form>
 </body>
</html>
